<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Avatar - AI Humans for Business</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0b0f19;
      color: #ffffff;
      text-align: center;
      padding-top: 60px;
      padding-bottom: 120px;
    }

    h1 { font-size: 52px; margin: 20px 0 12px; font-weight: 700; }
    .subtitle { font-size: 19px; color: #a9b3c7; max-width: 720px; margin: 0 auto 50px; line-height: 1.6; }

    #avatarContainer {
      width: 100%; max-width: 860px; height: 640px; background: #000;
      margin: 40px auto; border-radius: 24px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .lead-section {
      max-width: 800px; margin: 100px auto 80px; background: rgba(18,24,38,0.95);
      padding: 50px 40px; border-radius: 24px;
    }

    .video-grid {
      max-width: 1200px; margin: 0 auto; display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 30px; padding: 0 20px;
    }
  </style>
</head>
<body>

  <h1>Virtual Avatar</h1>
  <p class="subtitle">Real-time AI Humans that speak, engage, and convert for your business.</p>

  <div id="avatarContainer"></div>

  <div class="avatar-controls">
    <input id="avatarInput" type="text" placeholder="Talk to the avatar..." />
    <button id="avatarSendBtn">Send</button>
    <button id="avatarMicBtn">🎤</button>
  </div>

  <button id="startAvatarBtn">Start Your Live Avatar</button>

  <!-- Lead Form -->
  <div class="lead-section">
    <h2>Ready to get your own AI Avatar?</h2>
    <p style="color:#a9b3c7; margin-bottom: 30px;">Tell us about your business and we'll create a custom demo for you.</p>
    
    <form id="leadForm">
      <input id="leadName" type="text" placeholder="Your Name" required />
      <input id="leadEmail" type="email" placeholder="Email Address" required />
      <input id="leadBusiness" type="text" placeholder="Business Name" />
      <textarea id="leadNote" placeholder="Tell us about your project" rows="5"></textarea>
      <button type="submit">Request Demo</button>
    </form>
    <p id="leadStatus"></p>
  </div>

  <!-- Video Showcase -->
  <h2 style="margin: 80px 0 30px; font-size: 38px;">Industry Avatar Showcase</h2>
  <div class="video-grid">
    <div>
      <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px;">
        <iframe src="https://player.vimeo.com/video/1165938527" 
                frameborder="0" allow="autoplay; fullscreen" 
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe>
      </div>
      <h3>Dreaming of Africa</h3>
    </div>
  </div>

  <script src="https://player.vimeo.com/api/player.js"></script>

  <!-- Lead Form Script -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('leadForm');
      const status = document.getElementById('leadStatus');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        status.textContent = "Submitting...";
        status.style.color = "#666";

        const data = {
          name: document.getElementById('leadName').value.trim(),
          email: document.getElementById('leadEmail').value.trim(),
          business: document.getElementById('leadBusiness').value.trim(),
          note: document.getElementById('leadNote').value.trim()
        };

        try {
          const res = await fetch('/api/lead', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });

          if (res.ok) {
            status.textContent = "✅ Thank you! We'll contact you soon.";
            status.style.color = "#00ff9d";
            form.reset();
          } else {
            throw new Error();
          }
        } catch (err) {
          status.textContent = "❌ Error. Please try again.";
          status.style.color = "#ff6b6b";
        }
      });
    });
  </script>
</body>
</html>
